<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情侶記帳 - SweetLedger</title>
    <script type="module">
      // 確保在不支援 VITE 環境變數的環境中，不會因為 import.meta.env 為 undefined 而崩潰
      const env = (typeof import.meta !== 'undefined' && import.meta.env) ? import.meta.env : {};

      // 透過 Vercel 的環境變數注入 Firebase 資訊
      window.__firebase_config = env.VITE_FIREBASE_CONFIG || '{}';
      window.__initial_auth_token = env.VITE_AUTH_TOKEN || '';
      window.__app_id = 'sweet-ledger-beta';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
